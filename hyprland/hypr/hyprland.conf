monitor=eDP-1,1920x1080@60,0x0,1.2         # 1.2 scalling => x = 1920/1.2 = 1600
monitor=HDMI-A-1,1920x1080@75,1600x0,1
monitor=ghost,1920x1080@60,3520x0,1.2     # Position => x = 1600 + 1920 = 3520

workspace = 1, monitor:eDP-1
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:HDMI-A-1
workspace = 5, monitor:eDP-1
workspace = 6, monitor:HDMI-A-1
workspace = 7, monitor:eDP-1
workspace = 8, monitor:HDMI-A-1
workspace = 9, monitor:eDP-1
workspace = 10, monitor:ghost
workspace = 11, persistent:true

$terminal = foot
$fileManager = thunar
$menu = albert toggle
$togglewaybar = ~/.config/waybar/toggle-waybar.sh

exec-once = waybar &
exec-once = hyprpaper &
exec-once = albert &
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = sleep 1 & hyprctl dispatch focusmonitor HDMI-A-1 && QSG_RENDER_LOOP=basic quickshell 
exec-once = dunst

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

general {
    gaps_in = 0
    gaps_out = 0

    border_size = 0
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 5
    active_opacity = 1.0
    inactive_opacity = 1.0
    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = false
        size = 8
        passes = 2
        vibrancy = 0.1696
    }
}


animations {
    enabled = no
#
#    bezier = snappy, 0.05, 0.9, 0.1, 1.0
#
#    animation = windows, 1, 2, snappy, popin 85%
#    animation = windowsOut, 1, 2, snappy, popin 85%
#    animation = border, 1, 6, default
#    animation = fade, 1, 2, snappy
#    animation = workspaces, 1, 2, snappy
#    animation = specialWorkspace, 1, 2, snappy, slidefadevert
}


master {
    new_status = master
}

misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat
    touchpad {
        natural_scroll = true
    }
    numlock_by_default = true
}

device {
    name = wacom-one-by-wacom-s-pen
    output = eDP-1
}




$mainMod = SUPER # Sets "Windows" key as main modifier
$altMod = ALT
bind = CTRL ALT, S, exec, python ~/code/python/tts.py

bind = $altMod, return, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, Q, exec, hyprctl dispatch exit 
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $altMod, F, togglefloating
bind = $mainMod, F, fullscreen
bind = $altMod, space, exec, $menu
bind = $mainMod, space, exec, wofi --show drun
bind = $mainMod SHIFT, W, exec, $togglewaybar
bind = $mainMod, P, pin,
bind = $mainMod SHIFT, S, exec, hyprshot -m region --output-folder ~/Pictures/Screenshots
bind = $mainMod, S, exec, hyprshot -m window --output-folder ~/Pictures/Screenshots

bind = $mainMod, l, movefocus, r
bind = $mainMod, h, movefocus, l
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, d, workspace, 11

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod SHIFT, d, movetoworkspace, 11


bind = $altMod, TAB, togglespecialworkspace, magic
bind = $altMod SHIFT, TAB, movetoworkspace, special:magic

bind = $mainMod, TAB, togglespecialworkspace, magic2
bind = $mainMod SHIFT, TAB, movetoworkspace, special:magic2

bind = $altMod, grave, togglespecialworkspace, magic3
bind = $altMod SHIFT, grave, movetoworkspace, special:magic3

bind = $mainMod, grave, togglespecialworkspace, magic4
bind = $mainMod SHIFT, grave, movetoworkspace, special:magic4


bind = $altMod, h, workspace, -1
bind = $altMod, l, workspace, +1
bind = $altMod SHIFT, h, movetoworkspace, -1
bind = $altMod SHIFT, l, movetoworkspace, +1


bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-


bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bindl = , XF86PowerOff, exec, pgrep hyprlock || hyprlock

windowrule = float on, match:class blueman-manager
windowrule = center on, match:class blueman-manager

windowrule = float on, match:title ^Alacritty
windowrule = center on, match:title ^Alacritty

windowrule = float on, match:class ^com\.network\.manager$
windowrule = center on, match:class ^com\.network\.manager$

windowrule = float on, match:class ^org\.pulseaudio\.pavucontrol$
windowrule = size 1000 700, match:class ^org\.pulseaudio\.pavucontrol$
windowrule = center on, match:class ^org\.pulseaudio\.pavucontrol$

windowrule = float on, match:class ^org\.qbittorrent\.qBittorrent$
windowrule = center on, match:class ^org\.qbittorrent\.qBittorrent$

windowrule = float on, match:class thunar
windowrule = center on, match:class thunar
windowrule = size 1000 700, match:class thunar
windowrule = float on, match:class Thunar
windowrule = center on, match:class Thunar
windowrule = size 1000 700, match:class Thunar

windowrule = workspace 4 silent, match:class discord
windowrule = workspace special:magic3 silent, match:class elecwhat

windowrule = float on, match:title ^Picture-in-Picture$
windowrule = center on, match:title ^Picture-in-Picture$

windowrule = float on, match:title ^Picture-in-picture$
windowrule = center on, match:title ^Picture-in-picture$

windowrule = float on, match:title ^Open Folder$
windowrule = center on, match:title ^Open Folder$
