general {
    disable_loading_bar = true
    grace = 0
    hide_cursor = true
    no_fade_in = true
}

background {
    color = rgba(0, 0, 0, 1)
}

input-field {
    size = 1, 1
    outline_thickness = 0

    dots_size = 0
    dots_spacing = 0
    dots_center = true

    outer_color = rgba(0,0,0,0)
    inner_color = rgba(0,0,0,0)
    font_color = rgba(0,0,0,0)

    fade_on_empty = false

    position = 0, 0
    halign = center
    valign = center
}
